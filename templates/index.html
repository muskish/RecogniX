<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition System</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Face Recognition System</h1>
            <div class="stats" id="stats">
                <div class="stat-item">
                    <span class="stat-label">Users:</span>
                    <span class="stat-value" id="totalUsers">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Images:</span>
                    <span class="stat-value" id="totalImages">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Classifier:</span>
                    <span class="stat-value" id="classifierStatus">Not Trained</span>
                </div>
            </div>
        </header>

        <!-- Tab Navigation -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('register')">Register User</button>
            <button class="tab-btn" onclick="showTab('capture')">Capture Images</button>
            <button class="tab-btn" onclick="showTab('train')">Train System</button>
            <button class="tab-btn" onclick="showTab('recognize')">Recognize Face</button>
            <button class="tab-btn" onclick="showTab('users')">Manage Users</button>
        </div>

        <!-- Register Tab -->
        <div id="register" class="tab-content active">
            <h2>Register New User</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="education">Education:</label>
                    <input type="text" id="education" required>
                </div>
                <div class="form-group">
                    <label for="iq">IQ:</label>
                    <input type="number" id="iq" required>
                </div>
                <button type="submit" class="btn btn-primary">Register User</button>
            </form>
            <div id="registerMessage" class="message"></div>
        </div>

        <!-- Capture Tab -->
        <div id="capture" class="tab-content">
            <h2>Capture Face Images</h2>
            <div class="form-group">
                <label for="userSelect">Select User:</label>
                <select id="userSelect">
                    <option value="">-- Select User --</option>
                </select>
            </div>
            
            <div class="video-container">
                <video id="video" autoplay></video>
                <canvas id="canvas" style="display:none;"></canvas>
            </div>
            
            <div class="controls">
                <button id="startCamera" class="btn btn-primary">Start Camera</button>
                <button id="captureBtn" class="btn btn-success" disabled>Capture Image</button>
                <button id="stopCamera" class="btn btn-danger" disabled>Stop Camera</button>
            </div>
            
            <div class="capture-info">
                <p>Images Captured: <span id="captureCount">0</span> / 200</p>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>
            
            <div id="captureMessage" class="message"></div>
        </div>

        <!-- Train Tab -->
        <div id="train" class="tab-content">
            <h2>Train Face Recognition System</h2>
            <p>Click the button below to train the system with all captured images.</p>
            <button id="trainBtn" class="btn btn-primary">Train Classifier</button>
            <div id="trainMessage" class="message"></div>
            <div id="trainProgress" class="progress-info"></div>
        </div>

        <!-- Recognize Tab -->
        <div id="recognize" class="tab-content">
            <h2>Recognize Face</h2>
            <div class="video-container">
                <video id="recognizeVideo" autoplay></video>
                <canvas id="recognizeCanvas" style="display:none;"></canvas>
            </div>
            
            <div class="controls">
                <button id="startRecognizeCamera" class="btn btn-primary">Start Camera</button>
                <button id="recognizeBtn" class="btn btn-success" disabled>Recognize Face</button>
                <button id="stopRecognizeCamera" class="btn btn-danger" disabled>Stop Camera</button>
            </div>
            
            <div id="recognizeResult" class="result-box"></div>
            <div id="recognizeMessage" class="message"></div>
        </div>

        <!-- Users Tab -->
        <div id="users" class="tab-content">
            <h2>Manage Users</h2>
            <button id="refreshUsers" class="btn btn-secondary">Refresh List</button>
            <div id="usersList" class="users-list"></div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
